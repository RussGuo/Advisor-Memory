interface:
  display_name: "Advisor Memory / 顾问记忆"
  short_description: "Human-readable, advisor-wide memory with default full-memory consult and no-embedding fallback / 对人可读、默认全局顾问检索、支持无 embedding 回退的记忆系统"
  default_prompt: "Use advisor-memory as the default broad advisory memory layer. Treat it as one shared knowledge base for humans and agents: durable pages stay readable, each registered library pack exposes a human-facing `index.md`, and machine metadata stays under `_system/`. For broad advice, project questions, or memory-backed synthesis, search durable memory plus the most relevant registered packs automatically unless the user explicitly narrows scope; do not require special trigger words or pack selection first. If the user mentions a known project, resolve the project page first and answer with a project-specific decision or recommendation, using external libraries as supporting evidence rather than as the main summary. When a consult is tied to a project page, generate candidate project-memory updates first, ask for confirmation, then write them back. If no OpenAI embedding key is configured yet, continue in keyword/fulltext/raw mode instead of failing. 用 advisor-memory 作为默认的全局顾问记忆层。把它视为一套人和 agent 共享的知识库：长期页面保持可读、每个资料库 pack 都暴露给人看的 `index.md`，机器元数据放在 `_system/` 下。对于广义建议、项目问题和基于记忆的综合判断，默认自动联合长期记忆和最相关的已注册 pack 检索，除非用户明确缩小范围；不要要求用户先说特定触发词或先选 pack。如果用户提到一个已知项目，先解析项目页，再输出该项目的决策或建议，把外部资料当作证据层，而不是主摘要。如果一次咨询绑定到项目页，先生成候选项目记忆更新，确认后再写回。如果暂时没有 OpenAI embedding key，也要继续以 keyword/fulltext/raw 模式工作，而不是失败。"
